server:
  global:
    # MOD - Scraping interval
    ## How frequently to scrape targets by default
    scrape_interval: 1m
    ## How long until a scrape request times out
    scrape_timeout: 10s
    ## How frequently to evaluate rules
    evaluation_interval: 1m
  
  # MOD - Remote write and read
  ## https://prometheus.io/docs/prometheus/latest/configuration/configuration/#remote_write
  remoteWrite: []
  ## https://prometheus.io/docs/prometheus/latest/configuration/configuration/#remote_read
  remoteRead: []

  # MOD - Ingress
  #prefixURL: "/prometheus"
  #baseURL: "/prometheus"
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
    hosts:
      - prometheus.localhost
    path: /
    pathType: ImplementationSpecific
  
# MOD - ServerFiles
serverFiles:
  prometheus.yml:
    # MOD - Scrape Configs
    scrape_configs: []
      
      # #! If prefixURL is set, the path in the scrape_configs 
      # #! must be prefixed with it manually (e.g. localhost/prometheus)
      # - job_name: prometheus
      #   static_configs:
      #     - targets:
      #       - localhost/prometheus:9090 #localhost:9090


# MOD - Kube-state-metrics
## Please see https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-state-metrics
kube-state-metrics:
  enabled: false

# MOD - Alertmanager
alertmanager:
  enabled: false

# MOD - Node-exporter
prometheus-node-exporter:
  enabled: false

# MOD - Pushgateway
## Please see https://github.com/prometheus-community/helm-charts/tree/main/charts/prometheus-pushgateway
prometheus-pushgateway:
  enabled: false
    